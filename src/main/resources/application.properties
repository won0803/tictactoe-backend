# 1. \uC11C\uBC84 \uD3EC\uD2B8 \uC124\uC815
# \uC560\uD50C\uB9AC\uCF00\uC774\uC158\uC774 \uC2E4\uD589\uB420 \uD3EC\uD2B8 \uBC88\uD638\uB97C \uC9C0\uC815\uD569\uB2C8\uB2E4. (\uAE30\uBCF8\uAC12\uC740 8080)
server.port=8115

# 2. JSP \uBDF0 \uB9AC\uC878\uBC84 \uC124\uC815
# \uCEE8\uD2B8\uB864\uB7EC\uC5D0\uC11C \uB9AC\uD134\uD558\uB294 \uBDF0 \uC774\uB984\uC758 \uC55E(\uACBD\uB85C)\uACFC \uB4A4(\uD655\uC7A5\uC790)\uB97C \uBD99\uC5EC\uC90D\uB2C8\uB2E4.
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# 3. MySQL \uB370\uC774\uD130\uBCA0\uC774\uC2A4 \uC5F0\uACB0 \uC124\uC815
# serverTimezone\uC744 Asia/Seoul\uB85C \uC124\uC815\uD558\uC5EC \uD55C\uAD6D \uD45C\uC900\uC2DC\uB97C \uC0AC\uC6A9\uD569\uB2C8\uB2E4.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/demo?useSSL=false&useUnicode=true&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
spring.datasource.username=demo
spring.datasource.password=123456789123456789

# 4. MyBatis \uC124\uC815
# mapper-locations: SQL \uCFFC\uB9AC\uAC00 \uC791\uC131\uB41C XML \uD30C\uC77C\uC758 \uC704\uCE58\uB97C \uC9C0\uC815\uD569\uB2C8\uB2E4.
# type-aliases-package: \uACB0\uACFC \uB370\uC774\uD130\uB97C \uB2F4\uC744 \uC790\uBC14 \uAC1D\uCCB4(VO/DTO)\uC758 \uD328\uD0A4\uC9C0 \uACBD\uB85C\uB97C \uC904\uC5EC\uC4F0\uAE30 \uC704\uD574 \uC9C0\uC815\uD569\uB2C8\uB2E4.
# map-underscore-to-camel-case: DB\uC758 snake_case \uCEEC\uB7FC\uBA85\uC744 \uC790\uBC14\uC758 camelCase \uBCC0\uC218\uBA85\uC73C\uB85C \uC790\uB3D9 \uB9E4\uD551\uD569\uB2C8\uB2E4.
mybatis.mapper-locations=classpath:/mapper/**/*.xml
mybatis.type-aliases-package=seeya.insight.user.domain
mybatis.configuration.map-underscore-to-camel-case=true

# 5. \uB85C\uAE45 \uB808\uBCA8 \uC124\uC815 (\uB85C\uADF8 \uCD9C\uB825 \uC81C\uC5B4)
# TRACE \uB808\uBCA8\uC740 \uC2E4\uD589\uB418\uB294 SQL \uCFFC\uB9AC\uC640 \uD30C\uB77C\uBBF8\uD130 \uC815\uBCF4\uAE4C\uC9C0 \uC0C1\uC138\uD788 \uCD9C\uB825\uD569\uB2C8\uB2E4.
logging.level.seeya.insight.user.mapper=TRACE
logging.level.root=info

# 6. JPA \uBC0F \uD558\uC774\uBC84\uB124\uC774\uD2B8 \uC124\uC815
# ddl-auto: update\uB294 \uC5D4\uD2F0\uD2F0 \uAD6C\uC870\uC640 DB \uC2A4\uD0A4\uB9C8\uB97C \uBE44\uAD50\uD558\uC5EC \uBCC0\uACBD\uB41C \uBD80\uBD84\uB9CC \uBC18\uC601\uD569\uB2C8\uB2E4.
# show-sql: \uC2E4\uD589\uB418\uB294 SQL\uC744 \uCF58\uC194\uCC3D\uC5D0 \uCD9C\uB825\uD569\uB2C8\uB2E4.
# format_sql: \uCD9C\uB825\uB418\uB294 SQL\uC744 \uBCF4\uAE30 \uC88B\uAC8C \uC815\uB82C\uD569\uB2C8\uB2E4.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.generate-ddl-auto=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# 7. \uD504\uB85C\uD544 \uBC0F \uC138\uC158 \uC124\uC815
# \uCD94\uAC00\uB85C \uD3EC\uD568\uD560 \uC124\uC815 \uD30C\uC77C(real-db)\uC744 \uC9C0\uC815\uD569\uB2C8\uB2E4.
spring.profiles.include=real-db
# \uC138\uC158 \uC815\uBCF4\uB97C \uBA54\uBAA8\uB9AC\uAC00 \uC544\uB2CC \uB370\uC774\uD130\uBCA0\uC774\uC2A4(JDBC)\uC5D0 \uC800\uC7A5\uD558\uC5EC \uC11C\uBC84 \uC7AC\uC2DC\uC791 \uC2DC\uC5D0\uB3C4 \uB85C\uADF8\uC778\uC744 \uC720\uC9C0\uD569\uB2C8\uB2E4.
spring.session.store-type=jdbc

# 8. \uAC1C\uBC1C \uB3C4\uAD6C (Devtools) - JSP \uC218\uC815 \uC2DC \uC790\uB3D9 \uBC18\uC601 \uC124\uC815
# \uAC1C\uBC1C \uC911\uC5D0 \uCF54\uB4DC\uB97C \uC218\uC815\uD558\uBA74 \uC11C\uBC84\uB97C \uC218\uB3D9\uC73C\uB85C \uC7AC\uC2DC\uC791\uD558\uC9C0 \uC54A\uC544\uB3C4 \uBCC0\uACBD \uC0AC\uD56D\uC774 \uBC18\uC601\uB429\uB2C8\uB2E4.
spring.devtools.livereload.enabled=true
spring.devtools.restart.enabled=true
server.servlet.jsp.init-parameters.development=true